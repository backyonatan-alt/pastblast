<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1b1464">
    <title>PastBlast — Host</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="host.css">
    <link rel="stylesheet" href="rtl.css">
</head>
<body>
    <!-- LOBBY -->
    <div id="lobby" class="screen">
        <div class="lang-switcher">
            <button class="lang-btn" onclick="switchLang('en')" id="lang-en">English</button>
            <button class="lang-btn" onclick="switchLang('he')" id="lang-he">עברית</button>
        </div>
        <h1 class="logo">PASTBLAST</h1>
        <p class="sub"><span data-i18n="join_at">Join at</span> <span id="join-url"></span></p>
        <div class="code-display" id="room-code">...</div>
        <div id="qr-code" class="qr-box"></div>
        <div class="players-list" id="players-list">
            <p class="waiting-text" data-i18n="waiting_players">Waiting for players…</p>
        </div>
        <div class="mode-cards" role="group" aria-label="Game Mode">
            <div class="mode-card active" id="mode-timeline" onclick="selectMode('timeline')">
                <img class="mode-card-img" src="/img/mode-timeline.jpg" alt="Timeline">
                <div class="mode-card-title" data-i18n="timeline">Timeline</div>
                <div class="mode-card-desc" data-i18n="timeline_desc">Place events in chronological order</div>
            </div>
            <div class="mode-card" id="mode-quiz" onclick="selectMode('quiz')">
                <img class="mode-card-img" src="/img/mode-flags.jpg" alt="Flag Quiz">
                <div class="mode-card-title" data-i18n="flag_quiz">Flag Quiz</div>
                <div class="mode-card-desc" data-i18n="flag_quiz_desc">Name the country from its flag</div>
            </div>
            <div class="mode-card" id="mode-map" onclick="selectMode('map')">
                <img class="mode-card-img" src="/img/mode-map.jpg" alt="Map Game">
                <div class="mode-card-title" data-i18n="map_game">Map Game</div>
                <div class="mode-card-desc" data-i18n="map_game_desc">Find landmarks on the world map</div>
            </div>
        </div>
        <div class="mode-select" role="group" aria-label="Difficulty">
            <span data-i18n="difficulty">Difficulty</span>
            <div class="mode-buttons">
                <button class="mode-btn" id="diff-1" onclick="selectDifficulty(1)" data-i18n="easy">Easy</button>
                <button class="mode-btn active" id="diff-2" onclick="selectDifficulty(2)" data-i18n="medium">Medium</button>
                <button class="mode-btn" id="diff-3" onclick="selectDifficulty(3)" data-i18n="hard">Hard</button>
            </div>
        </div>
        <div class="mode-select" role="group" aria-label="Game Length">
            <span data-i18n="game_length">Game Length</span>
            <div class="mode-buttons">
                <button class="mode-btn" id="len-short" onclick="selectLength('short')" data-i18n="short">Short</button>
                <button class="mode-btn active" id="len-medium" onclick="selectLength('medium')" data-i18n="medium">Medium</button>
                <button class="mode-btn" id="len-long" onclick="selectLength('long')" data-i18n="long">Long</button>
            </div>
        </div>
        <button class="btn start-btn" id="start-btn" disabled onclick="startGame()" data-i18n="start_game">START GAME</button>
        <a id="how-to-play-link" href="/how-to-play.html" style="display:block;text-align:center;margin-top:16px;color:rgba(255,255,255,0.5);font-size:0.95rem;text-decoration:none;" data-i18n="how_to_play">How to play?</a>
        <div class="or-divider" data-i18n="or">— or —</div>
        <a id="local-link" href="/local.html" class="btn btn-local" data-i18n="play_locally">PLAY LOCALLY (no phones)</a>
        <a href="https://www.linkedin.com/in/yonatan-back/" target="_blank" rel="noopener" style="display:block;text-align:center;margin-top:20px;color:rgba(255,255,255,0.4);font-size:0.85rem;text-decoration:underline;">Made by Yonatan Back ↗</a>
    </div>

    <!-- GAME -->
    <div id="game-screen" class="screen" style="display:none;">
        <div class="game-header">
            <div class="game-header-left">
                <div class="turn-label" id="turn-label"></div>
                <div class="timer-bar"><div class="timer-bar-fill" id="timer-fill"></div></div>
                <div class="timer-number" id="timer-number"></div>
            </div>
            <div class="game-header-right">
                <div class="round-label" id="round-label"></div>
            </div>
        </div>

        <div class="steal-bar" id="steal-bar">
            <div class="steal-title" data-i18n="steal">STEAL!</div>
            <div class="steal-info" id="steal-info"></div>
        </div>

        <div class="game-body">
            <div class="card-area" id="card-area"></div>
            <div class="score-area">
                <div class="score-chart" id="score-chart"></div>
            </div>
        </div>
    </div>

    <!-- GAME OVER -->
    <div id="end-screen" class="screen" style="display:none;">
        <h1 class="logo" data-i18n="game_over">GAME OVER!</h1>
        <div id="winner-banner" class="winner-banner"></div>
        <div class="scoreboard" id="scoreboard"></div>
        <button class="btn play-again-btn" onclick="playAgain()" data-i18n="play_again">PLAY AGAIN</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/twemoji@latest/dist/twemoji.min.js"></script>
    <script src="i18n.js"></script>
    <script>
        function switchLang(lang) {
            setLanguage(lang).then(() => {
                document.getElementById('lang-en').classList.toggle('active', lang === 'en');
                document.getElementById('lang-he').classList.toggle('active', lang === 'he');
                const link = document.getElementById('how-to-play-link');
                link.href = lang === 'he' ? '/how-to-play-he.html' : '/how-to-play.html';
            });
        }
        window.addEventListener('DOMContentLoaded', () => {
            const lang = localStorage.getItem('pb_lang') || 'en';
            document.getElementById('lang-' + lang).classList.add('active');
            const link = document.getElementById('how-to-play-link');
            link.href = lang === 'he' ? '/how-to-play-he.html' : '/how-to-play.html';
        });
    </script>
    <script src="analytics.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="host.js"></script>
</body>
</html>
