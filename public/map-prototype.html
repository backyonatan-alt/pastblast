<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PastBlast — Map Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Fredoka', system-ui, sans-serif;
            background: #1b1464;
            color: #fff;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top bar */
        .top-bar {
            background: rgba(18,14,63,0.95);
            padding: 10px 16px 6px;
            text-align: center;
            z-index: 1000;
            flex: 0 0 auto;
        }

        .round-info {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 4px;
        }

        .landmark-photo {
            width: 100%;
            max-width: 280px;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.15);
            margin: 4px auto;
            display: block;
            background: rgba(255,255,255,0.05);
        }

        .landmark-question {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }

        .timer-strip {
            height: 4px;
            background: rgba(255,255,255,0.1);
            margin-top: 6px;
            border-radius: 2px;
        }

        .timer-fill {
            height: 100%;
            background: #ffd43b;
            border-radius: 2px;
            transition: width 1s linear;
        }
        .timer-fill.urgent { background: #ff6b6b; }

        /* Map */
        #map {
            flex: 1;
            z-index: 1;
        }

        /* Fixed crosshair in center */
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%);
            z-index: 1500;
            pointer-events: none;
            font-size: 2.2rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            transition: transform 0.15s ease;
        }

        .crosshair.locked {
            transform: translate(-50%, -100%) scale(1.3);
        }

        /* Crosshair dot on the ground */
        .crosshair-dot {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: #ff6b6b;
            border: 2px solid #fff;
            border-radius: 50%;
            z-index: 1500;
            pointer-events: none;
            box-shadow: 0 0 8px rgba(255,107,107,0.6);
        }

        /* Bottom bar with LOCK IN button */
        .bottom-bar {
            background: rgba(18,14,63,0.95);
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            text-align: center;
            z-index: 1000;
            flex: 0 0 auto;
        }

        .lock-btn {
            background: #ffd43b;
            color: #1b1464;
            border: none;
            border-radius: 16px;
            padding: 16px 0;
            font-size: 1.3rem;
            font-weight: 900;
            font-family: 'Fredoka', sans-serif;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            letter-spacing: 2px;
            box-shadow: 0 4px 0 #e8590c;
            transition: transform 0.1s, background-color 0.15s;
        }

        .lock-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #e8590c;
        }

        .lock-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .score-display {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-top: 6px;
        }

        .score-display span { color: #ffd43b; font-weight: 700; }

        /* Result overlay */
        .result-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10,10,46,0.85);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .result-overlay.show { display: flex; }

        .result-card {
            background: #1f1a5c;
            border-radius: 20px;
            padding: 24px 28px;
            max-width: 340px;
            width: 100%;
            border: 3px solid rgba(255,255,255,0.1);
        }

        .result-emoji { font-size: 3.5rem; margin-bottom: 6px; }
        .result-name { font-size: 1.3rem; font-weight: 700; color: #ffd43b; }
        .result-distance { font-size: 1.05rem; color: rgba(255,255,255,0.6); margin: 4px 0; }

        .result-score {
            font-size: 3rem;
            font-weight: 900;
            color: #ffd43b;
            margin: 8px 0;
            text-shadow: 2px 2px 0 #e8590c;
        }

        .result-breakdown {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.45);
            line-height: 1.8;
        }

        .result-breakdown .bonus { color: #51cf66; }

        .next-btn {
            background: #ffd43b;
            color: #1b1464;
            border: none;
            border-radius: 14px;
            padding: 14px 0;
            font-size: 1.15rem;
            font-weight: 700;
            font-family: 'Fredoka', sans-serif;
            cursor: pointer;
            margin-top: 16px;
            width: 100%;
            box-shadow: 0 3px 0 #e8590c;
        }

        .next-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #e8590c;
        }

        /* Leaflet overrides */
        .leaflet-container { background: #d4c4a8; }
        .leaflet-control-zoom { display: none; }
        .leaflet-control-attribution { display: none; }

        /* Zoom hint */
        .zoom-hint {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1500;
            background: rgba(18,14,63,0.8);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="round-info" id="round-info">Round 1 / 10</div>
        <img class="landmark-photo" id="landmark-photo" src="" alt="Where is this?">
        <div class="landmark-question">Where is this place?</div>
        <div class="timer-strip"><div class="timer-fill" id="timer-fill"></div></div>
    </div>

    <div id="map"></div>

    <div class="crosshair" id="crosshair">📍</div>
    <div class="crosshair-dot" id="crosshair-dot"></div>

    <div class="zoom-hint" id="zoom-hint">Pinch to zoom • Drag to move</div>

    <div class="bottom-bar">
        <button class="lock-btn" id="lock-btn" onclick="lockIn()">LOCK IN</button>
        <div class="score-display">Total: <span id="total-score">0</span></div>
    </div>

    <div class="result-overlay" id="result-overlay">
        <div class="result-card">
            <div class="result-emoji" id="result-emoji"></div>
            <div class="result-name" id="result-name"></div>
            <div class="result-distance" id="result-distance"></div>
            <div class="result-score" id="result-score"></div>
            <div class="result-breakdown" id="result-breakdown"></div>
            <button class="next-btn" onclick="nextRound()">NEXT →</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    const landmarks = [
        { name: "Eiffel Tower", emoji: "🗼", lat: 48.8584, lng: 2.2945, wiki: "Eiffel_Tower" },
        { name: "Statue of Liberty", emoji: "🗽", lat: 40.6892, lng: -74.0445, wiki: "Statue_of_Liberty" },
        { name: "Taj Mahal", emoji: "🕌", lat: 27.1751, lng: 78.0421, wiki: "Taj_Mahal" },
        { name: "Great Wall of China", emoji: "🧱", lat: 40.4319, lng: 116.5704, wiki: "Great_Wall_of_China" },
        { name: "Colosseum", emoji: "🏟️", lat: 41.8902, lng: 12.4922, wiki: "Colosseum" },
        { name: "Machu Picchu", emoji: "🏔️", lat: -13.1631, lng: -72.5450, wiki: "Machu_Picchu" },
        { name: "Sydney Opera House", emoji: "🎭", lat: -33.8568, lng: 151.2153, wiki: "Sydney_Opera_House" },
        { name: "Pyramids of Giza", emoji: "🔺", lat: 29.9792, lng: 31.1342, wiki: "Great_Pyramid_of_Giza" },
        { name: "Big Ben", emoji: "🕐", lat: 51.5007, lng: -0.1246, wiki: "Big_Ben" },
        { name: "Christ the Redeemer", emoji: "✝️", lat: -22.9519, lng: -43.2105, wiki: "Christ_the_Redeemer_(statue)" },
    ];

    let map, playerMarker, correctMarker, lineLayer;
    let timerInterval, secondsLeft = 30;
    let round = 0, totalScore = 0;
    let locked = false;
    const shuffled = [...landmarks].sort(() => Math.random() - 0.5);

    // Init map — watercolor style
    map = L.map('map', {
        center: [25, 10],
        zoom: 2,
        minZoom: 2,
        maxZoom: 18,
        zoomControl: false,
        attributionControl: false,
    });

    // Watercolor only — no labels (labels would give away locations)
    L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.jpg', {}).addTo(map);

    const pinIcon = L.divIcon({
        html: '<div style="font-size:2rem;text-align:center;">📍</div>',
        iconSize: [30, 40],
        iconAnchor: [15, 40],
        className: '',
    });

    const correctIcon = L.divIcon({
        html: '<div style="font-size:2rem;text-align:center;">✅</div>',
        iconSize: [30, 30],
        iconAnchor: [15, 30],
        className: '',
    });

    // Hide zoom hint after first interaction
    map.on('movestart', () => {
        const hint = document.getElementById('zoom-hint');
        hint.style.opacity = '0';
        setTimeout(() => hint.style.display = 'none', 500);
    });

    function startRound() {
        if (round >= shuffled.length) {
            document.getElementById('landmark-photo').style.display = 'none';
            document.querySelector('.landmark-question').textContent = `🏆 Final Score: ${totalScore}`;
            document.getElementById('round-info').textContent = 'Game Over!';
            document.getElementById('lock-btn').disabled = true;
            document.getElementById('lock-btn').textContent = 'DONE';
            document.getElementById('crosshair').style.display = 'none';
            document.getElementById('crosshair-dot').style.display = 'none';
            return;
        }

        const lm = shuffled[round];
        document.getElementById('round-info').textContent = `Round ${round + 1} / ${shuffled.length}`;

        // Fetch photo from Wikipedia
        const photo = document.getElementById('landmark-photo');
        photo.src = '';
        photo.alt = 'Where is this?';
        fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${lm.wiki}`)
            .then(r => r.json())
            .then(data => {
                if (data.thumbnail && data.thumbnail.source) {
                    // Get a wider version
                    photo.src = data.thumbnail.source.replace(/\/\d+px-/, '/600px-');
                }
            })
            .catch(() => {
                photo.alt = lm.emoji;
            });

        // Reset
        if (playerMarker) { map.removeLayer(playerMarker); playerMarker = null; }
        if (correctMarker) { map.removeLayer(correctMarker); correctMarker = null; }
        if (lineLayer) { map.removeLayer(lineLayer); lineLayer = null; }
        map.setView([25, 10], 2);
        document.getElementById('result-overlay').classList.remove('show');
        document.getElementById('lock-btn').disabled = false;
        document.getElementById('lock-btn').textContent = 'LOCK IN';
        document.getElementById('crosshair').style.display = 'block';
        document.getElementById('crosshair-dot').style.display = 'block';
        locked = false;

        // Timer
        secondsLeft = 30;
        document.getElementById('timer-fill').style.width = '100%';
        document.getElementById('timer-fill').classList.remove('urgent');
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            secondsLeft--;
            document.getElementById('timer-fill').style.width = (secondsLeft / 30 * 100) + '%';
            if (secondsLeft <= 5) document.getElementById('timer-fill').classList.add('urgent');
            if (secondsLeft <= 0) { clearInterval(timerInterval); lockIn(); }
        }, 1000);
    }

    function lockIn() {
        if (locked) return;
        locked = true;
        clearInterval(timerInterval);

        document.getElementById('lock-btn').disabled = true;
        document.getElementById('lock-btn').textContent = '✓ LOCKED';
        document.getElementById('crosshair').classList.add('locked');

        // Get center of map as the guess
        const center = map.getCenter();
        const lm = shuffled[round];
        const dist = haversine(center.lat, center.lng, lm.lat, lm.lng);
        const timeUsed = 30 - secondsLeft;

        // Place markers
        playerMarker = L.marker([center.lat, center.lng], { icon: pinIcon }).addTo(map);
        correctMarker = L.marker([lm.lat, lm.lng], { icon: correctIcon }).addTo(map);

        // Draw line
        lineLayer = L.polyline([
            [center.lat, center.lng], [lm.lat, lm.lng]
        ], { color: '#ff6b6b', weight: 3, dashArray: '10,8', opacity: 0.8 }).addTo(map);

        // Fit both points
        map.fitBounds([[center.lat, center.lng], [lm.lat, lm.lng]], { padding: [60, 60] });

        // Hide crosshair
        document.getElementById('crosshair').style.display = 'none';
        document.getElementById('crosshair-dot').style.display = 'none';

        // Score
        const distPoints = Math.max(0, Math.round(1000 * Math.exp(-dist / 1500)));
        const speedBonus = Math.max(0, Math.round(500 * (1 - timeUsed / 30)));
        const countryBonus = dist < 300 ? 200 : 0;
        const roundScore = distPoints + speedBonus + countryBonus;
        totalScore += roundScore;
        document.getElementById('total-score').textContent = totalScore;

        // Show result after a beat
        setTimeout(() => showResult(lm, dist, distPoints, speedBonus, countryBonus, roundScore), 1500);
    }

    function showResult(lm, dist, distPoints, speedBonus, countryBonus, roundScore) {
        let emoji;
        if (distPoints >= 900) emoji = '🎯';
        else if (distPoints >= 600) emoji = '🔥';
        else if (distPoints >= 300) emoji = '👍';
        else if (distPoints >= 100) emoji = '🤔';
        else emoji = '😅';

        document.getElementById('result-emoji').textContent = emoji;
        document.getElementById('result-name').textContent = `${lm.emoji} ${lm.name}`;
        document.getElementById('result-distance').textContent = dist < 1 ? 'Spot on!' : `${Math.round(dist)} km away`;
        document.getElementById('result-score').textContent = `+${roundScore}`;

        let breakdown = `Distance: +${distPoints}`;
        if (speedBonus > 0) breakdown += `<br><span class="bonus">Speed: +${speedBonus}</span>`;
        if (countryBonus > 0) breakdown += `<br><span class="bonus">Country bonus: +${countryBonus}</span>`;
        document.getElementById('result-breakdown').innerHTML = breakdown;

        document.getElementById('result-overlay').classList.add('show');
    }

    function nextRound() {
        round++;
        startRound();
    }

    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    startRound();
    </script>
</body>
</html>
