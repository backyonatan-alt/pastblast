<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1b1464">
    <title>PastBlast — Solo Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="rtl.css">
    <script src="https://unpkg.com/twemoji@latest/dist/twemoji.min.js"></script>
    <style>
        /* ===== SOLO MODE STYLES ===== */

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
        }

        .screen.active { display: flex; }

        .logo {
            font-size: min(3.5rem, 12vw);
            color: #ffd43b;
            letter-spacing: 4px;
            text-shadow: 3px 3px 0 #e8590c;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 1.4rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .tagline {
            color: rgba(255,255,255,0.5);
            font-size: 1.15rem;
            margin-top: 20px;
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: rgba(255,255,255,0.45);
            font-size: 0.95rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: #fff; }

        /* Mode cards */
        .mode-cards {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
            width: 100%;
        }

        .mode-card {
            flex: 1 1 240px;
            max-width: 280px;
            background: #2b2280;
            border: 4px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 28px 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .mode-card:hover {
            border-color: #ffd43b;
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .mode-card-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .mode-card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffd43b;
            margin-bottom: 6px;
        }

        .mode-card-desc {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.55);
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .mode-card-best {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            font-weight: 600;
        }
        .mode-card-best span {
            color: #ffd43b;
        }

        /* Top bar */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
            background: #120e3f;
            border-bottom: 4px solid #ff6b6b;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lives {
            font-size: 1.6rem;
            letter-spacing: 4px;
        }

        .top-bar-center {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffd43b;
        }

        .top-bar-right {
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            font-weight: 600;
            text-align: right;
        }

        .streak-display {
            font-size: 1.1rem;
            color: #ff6b6b;
            font-weight: 700;
            min-height: 1.4em;
        }

        /* Current card */
        .current-card {
            background: #2b2280;
            border: 4px solid #ffd43b;
            border-radius: 24px;
            padding: 24px 40px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 6px 0 #e8590c, 0 12px 30px rgba(0,0,0,0.3);
            animation: cardBounce 0.4s ease;
        }

        .current-card .category {
            display: inline-block;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #1b1464;
            background: #ffd43b;
            padding: 4px 16px;
            border-radius: 20px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .current-card .flag-display {
            font-size: 7rem;
            line-height: 1.1;
            margin: 8px 0;
        }

        .current-card .hint {
            font-size: 1.15rem;
            color: rgba(255,255,255,0.5);
            margin-top: 6px;
        }

        .current-card .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .current-card .description {
            font-size: 1.15rem;
            color: rgba(255,255,255,0.55);
            line-height: 1.5;
            margin-top: 8px;
        }

        .instruction {
            margin-top: 16px;
            font-size: 1.2rem;
            color: #ffd43b;
            font-weight: 600;
        }

        /* Timeline */
        .timeline-container {
            width: 100%;
            max-width: 100%;
            margin: 16px auto 0;
            overflow-x: auto;
            padding: 10px 20px 30px;
        }

        .timeline {
            display: flex;
            align-items: center;
            min-height: 150px;
            position: relative;
            gap: 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 5px;
            background: #ff6b6b;
            border-radius: 3px;
            transform: translateY(-50%);
            z-index: 0;
        }

        .tl-direction-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 12px;
            position: relative;
            z-index: 1;
            white-space: nowrap;
            background: #1b1464;
            border-radius: 20px;
        }

        .timeline-slot {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 60px;
            padding: 8px 4px;
            position: relative;
            z-index: 1;
        }

        .timeline-slot.drop-zone {
            min-width: 60px;
            border: 3px solid rgba(255,212,59,0.3);
            border-radius: 50px;
            background: #1e1760;
            padding: 10px 16px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.2s, border-color 0.2s, transform 0.1s;
        }

        .timeline-slot.drop-zone:hover {
            background: #2a2080;
            border-color: #ffd43b;
            transform: scale(1.02);
        }

        .timeline-slot.drop-zone:active {
            transform: scale(0.98);
        }

        .timeline-slot.drop-zone .drop-label {
            font-size: 0.75rem;
            color: #ffd43b;
            text-align: center;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .placed-card {
            background: #2b2280;
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 14px;
            padding: 10px 14px;
            text-align: center;
            min-width: 110px;
            max-width: 150px;
        }

        .placed-card .card-emoji { font-size: 2.4rem; }
        .placed-card .card-name { font-size: 0.85rem; font-weight: 700; margin: 4px 0; }
        .placed-card .card-year { font-size: 1.15rem; color: #ffd43b; font-weight: 700; }

        /* Quiz styles */
        .quiz-card {
            background: #2b2280;
            border: 4px solid #ffd43b;
            border-radius: 24px;
            padding: 30px 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 6px 0 #e8590c, 0 12px 30px rgba(0,0,0,0.3);
            animation: cardBounce 0.4s ease;
        }

        .quiz-card .quiz-flag {
            font-size: 8rem;
            line-height: 1.1;
            margin: 10px 0 20px;
        }

        .quiz-input-wrap {
            position: relative;
            width: 100%;
        }

        .quiz-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1.3rem;
            font-family: 'Fredoka', sans-serif;
            border-radius: 14px;
            border: 3px solid rgba(255,255,255,0.2);
            background: #1b1464;
            color: #fff;
        }

        .quiz-input::placeholder { color: rgba(255,255,255,0.35); }
        .quiz-input:focus { outline: none; border-color: #ffd43b; }

        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 220px;
            overflow-y: auto;
            background: #1b1464;
            border: 2px solid #ffd43b;
            border-top: none;
            border-radius: 0 0 14px 14px;
            z-index: 60;
            display: none;
        }

        .autocomplete-item {
            padding: 10px 18px;
            font-size: 1.1rem;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .autocomplete-item:hover,
        .autocomplete-item.active {
            background: rgba(255,212,59,0.2);
            color: #ffd43b;
        }

        .autocomplete-item .match {
            color: #ffd43b;
            font-weight: 700;
        }

        /* Game area wrapper */
        .game-area {
            display: none;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .game-area.active { display: flex; }

        .game-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            flex: 1;
        }

        /* Game over */
        .final-score {
            font-size: 5rem;
            font-weight: 900;
            color: #ffd43b;
            text-shadow: 3px 3px 0 #e8590c;
            margin: 10px 0;
        }

        .new-best {
            font-size: 1.4rem;
            font-weight: 700;
            color: #51cf66;
            animation: popIn 1s ease forwards;
            margin-bottom: 10px;
        }

        .end-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
        }

        .end-stat {
            text-align: center;
        }

        .end-stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: #ffd43b;
        }

        .end-stat-label {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
        }

        .end-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #ffd43b;
            border: 3px solid rgba(255,212,59,0.3);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(255,212,59,0.15);
            border-color: #ffd43b;
        }

        .btn-share {
            background: rgba(255,255,255,0.1);
            color: #51cf66;
            border: 3px solid rgba(81,207,102,0.3);
            box-shadow: none;
        }

        .btn-share:hover {
            background: rgba(81,207,102,0.15);
            border-color: #51cf66;
        }

        .btn-share.copied {
            background: rgba(81,207,102,0.2);
            border-color: #51cf66;
            color: #51cf66;
        }

        /* Heart break animation */
        @keyframes heartBreak {
            0% { transform: scale(1); }
            30% { transform: scale(1.3); }
            60% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .heart-break { animation: heartBreak 0.5s ease; }

        /* Animations */
        @keyframes cardBounce {
            0% { opacity: 0; transform: translateY(-30px) scale(0.9); }
            60% { transform: translateY(8px) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            30% { transform: scale(1.2) rotate(3deg); opacity: 1; }
            50% { transform: scale(1) rotate(0deg); }
            80% { opacity: 1; }
            100% { transform: scale(0.95); opacity: 0; }
        }

        @keyframes popInStay {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            40% { transform: scale(1.15) rotate(2deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .confetti {
            position: fixed;
            top: -10px;
            font-size: 2rem;
            animation: confettiFall linear forwards;
            pointer-events: none;
            z-index: 200;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .current-card { padding: 20px; }
            .current-card .flag-display { font-size: 5rem; }
            .quiz-card .quiz-flag { font-size: 6rem; }

            .timeline-container { overflow-x: visible; padding: 10px 16px 30px; }

            .timeline {
                flex-direction: column;
                align-items: center;
                min-height: auto;
            }

            .timeline::before {
                top: 0; bottom: 0; left: 50%; right: auto;
                width: 4px; height: 100%;
                transform: translateX(-50%);
            }

            .timeline-slot { min-width: auto; width: 100%; max-width: 280px; }

            .timeline-slot.drop-zone {
                min-width: auto;
                width: 70%;
                padding: 8px 0;
                margin: 4px auto;
            }

            .placed-card {
                min-width: auto;
                max-width: none;
                width: 85%;
                margin: 3px auto;
                display: flex;
                align-items: center;
                gap: 10px;
                text-align: left;
                padding: 8px 14px;
            }

            .placed-card .card-emoji { font-size: 1.5rem; flex: 0 0 auto; }
            .placed-card .card-name { font-size: 0.8rem; }
            .placed-card .card-year { font-size: 0.85rem; }

            .mode-card { flex: 1 1 100%; max-width: 100%; }
            .top-bar { padding: 10px 14px; }
            .top-bar-center { font-size: 1.1rem; }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .current-card, .quiz-card { animation: none; }
            .confetti { animation: none; display: none; }
            .new-best { animation: none; opacity: 1; transform: scale(1); }
            .heart-break { animation: none; }
            .btn { transition: none; }
        }
    </style>
</head>
<body>

    <!-- ===== MODE SELECT ===== -->
    <div id="solo-start" class="screen active">
        <div class="lang-switcher">
            <button class="lang-btn" onclick="switchLang('en')" id="lang-en">English</button>
            <button class="lang-btn" onclick="switchLang('he')" id="lang-he">&#x05E2;&#x05D1;&#x05E8;&#x05D9;&#x05EA;</button>
        </div>
        <h1 class="logo">PASTBLAST</h1>
        <div class="subtitle" data-i18n="solo_mode">SOLO MODE</div>

        <div class="mode-cards">
            <div class="mode-card" onclick="startTimelineGame()">
                <div class="mode-card-icon">&#x1F3DB;&#xFE0F;</div>
                <div class="mode-card-title" data-i18n="timeline_survival">Timeline Survival</div>
                <div class="mode-card-desc" data-i18n="timeline_desc">Place events in chronological order</div>
                <div class="mode-card-best" id="best-timeline"></div>
            </div>
            <div class="mode-card" onclick="startQuizGame()">
                <div class="mode-card-icon">&#x1F3C1;</div>
                <div class="mode-card-title" data-i18n="flag_survival">Flag Quiz Survival</div>
                <div class="mode-card-desc" data-i18n="flag_quiz_desc">Name the country from its flag</div>
                <div class="mode-card-best" id="best-quiz"></div>
            </div>
        </div>

        <div class="tagline" data-i18n="how_far">How far can you go?</div>
        <a href="/" class="back-link" data-i18n="back_home">Back to Home</a>
        <a href="https://www.linkedin.com/in/yonatan-back/" target="_blank" rel="noopener" style="display:block;text-align:center;margin-top:16px;color:rgba(255,255,255,0.4);font-size:0.85rem;text-decoration:underline;" data-i18n="made_by">Made by Yonatan Back ↗</a>
    </div>

    <!-- ===== TIMELINE GAME ===== -->
    <div id="solo-timeline" class="game-area">
        <div class="top-bar">
            <div class="top-bar-left">
                <div class="lives" id="tl-lives"></div>
            </div>
            <div class="top-bar-center">
                <div data-i18n="score">Score</div>
                <div id="tl-score">0</div>
            </div>
            <div class="top-bar-right">
                <div class="streak-display" id="tl-streak"></div>
            </div>
        </div>
        <div class="game-content">
            <div class="current-card" id="tl-current-card"></div>
            <p class="instruction" data-i18n="tap_to_place">TAP TO PLACE</p>
            <div class="timeline-container">
                <div class="timeline" id="tl-timeline"></div>
            </div>
        </div>
    </div>

    <!-- ===== FLAG QUIZ GAME ===== -->
    <div id="solo-quiz" class="game-area">
        <div class="top-bar">
            <div class="top-bar-left">
                <div class="lives" id="qz-lives"></div>
            </div>
            <div class="top-bar-center">
                <div data-i18n="score">Score</div>
                <div id="qz-score">0</div>
            </div>
            <div class="top-bar-right">
                <div class="streak-display" id="qz-streak"></div>
            </div>
        </div>
        <div class="game-content">
            <div class="quiz-card" id="qz-card"></div>
            <div style="margin-top:20px;width:100%;max-width:400px;">
                <div class="quiz-input-wrap">
                    <input type="text" class="quiz-input" id="qz-input" data-i18n="type_country" placeholder="Type country name..." autocomplete="off">
                    <div class="autocomplete-list" id="qz-autocomplete"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== GAME OVER ===== -->
    <div id="solo-end" class="screen">
        <h1 class="logo" data-i18n="game_over">GAME OVER!</h1>
        <div id="end-new-best"></div>
        <div class="final-score" id="end-score">0</div>
        <div class="end-stats">
            <div class="end-stat">
                <div class="end-stat-value" id="end-best-streak">0</div>
                <div class="end-stat-label" data-i18n="best_streak">Best Streak</div>
            </div>
        </div>
        <div class="end-buttons">
            <button class="btn" id="end-play-again" data-i18n="play_again">PLAY AGAIN</button>
            <button class="btn btn-share" id="end-share" onclick="shareScore()" data-i18n="share">SHARE</button>
            <button class="btn btn-secondary" onclick="showModeSelect()" data-i18n="change_mode">Change Mode</button>
        </div>
        <a href="/" class="back-link" data-i18n="back_home">Back to Home</a>
    </div>

    <script src="analytics.js"></script>

    // ===========================
    // LANGUAGE
    // ===========================
    function switchLang(lang) {
        setLanguage(lang).then(() => {
            updateLangButtons();
            updateBestScores();
            parseEmoji();
        });
    }

    function updateLangButtons() {
        const lang = getLang();
        document.getElementById('lang-en').classList.toggle('active', lang === 'en');
        document.getElementById('lang-he').classList.toggle('active', lang === 'he');
    }

    // Wait for i18n to init then update
    setTimeout(() => { updateLangButtons(); updateBestScores(); parseEmoji(); }, 200);

    // ===========================
    // HELPERS
    // ===========================
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function formatYear(y) {
        if (y < 0) return `${Math.abs(y)} BCE`;
        return `${y}`;
    }

    function cName(card) {
        return (typeof isRTL === 'function' && isRTL() && card.name_he) ? card.name_he : card.name;
    }

    function cDesc(card) {
        return (typeof isRTL === 'function' && isRTL() && card.desc_he) ? card.desc_he : card.desc;
    }

    function parseEmoji() {
        if (typeof twemoji !== 'undefined') {
            twemoji.parse(document.body, { folder: 'svg', ext: '.svg' });
        }
    }

    // ===========================
    // SCREENS
    // ===========================
    function showScreen(id) {
        document.querySelectorAll('.screen, .game-area').forEach(el => {
            el.classList.remove('active');
            el.style.display = '';
        });
        const el = document.getElementById(id);
        if (el) {
            el.classList.add('active');
            if (el.classList.contains('game-area')) {
                el.style.display = 'flex';
            }
        }
    }

    function showModeSelect() {
        showScreen('solo-start');
        updateBestScores();
        parseEmoji();
    }

    function updateBestScores() {
        const btl = localStorage.getItem('pb_solo_best_timeline');
        const bqz = localStorage.getItem('pb_solo_best_quiz');
        const bestEl = document.getElementById('best-timeline');
        const bestQzEl = document.getElementById('best-quiz');
        if (btl && bestEl) bestEl.innerHTML = `${t('best_score', 'Best')}: <span>${btl}</span>`;
        else if (bestEl) bestEl.textContent = '';
        if (bqz && bestQzEl) bestQzEl.innerHTML = `${t('best_score', 'Best')}: <span>${bqz}</span>`;
        else if (bestQzEl) bestQzEl.textContent = '';
    }

    // ===========================
    // SHARED GAME STATE
    // ===========================
    let gameMode = ''; // 'timeline' or 'quiz'
    let lives = 3;
    let score = 0;
    let streak = 0;
    let bestStreak = 0;

    function renderLives(elId) {
        const el = document.getElementById(elId);
        let html = '';
        for (let i = 0; i < 3; i++) {
            html += i < lives ? '\u2764\uFE0F' : '\uD83D\uDDA4';
        }
        el.innerHTML = html;
        parseEmoji();
    }

    function loseLife(elId) {
        lives--;
        const el = document.getElementById(elId);
        el.classList.add('heart-break');
        setTimeout(() => el.classList.remove('heart-break'), 500);
        renderLives(elId);
        return lives <= 0;
    }

    function updateStreak(elId) {
        const el = document.getElementById(elId);
        if (streak >= 10) el.textContent = '\uD83D\uDD25\uD83D\uDD25\uD83D\uDD25 x' + streak;
        else if (streak >= 5) el.textContent = '\uD83D\uDD25\uD83D\uDD25 x' + streak;
        else if (streak >= 3) el.textContent = '\uD83D\uDD25 x' + streak;
        else el.textContent = '';
    }

    function showFeedback(correct, card) {
        const wrapper = document.createElement('div');
        wrapper.className = 'feedback-wrapper';
        const fb = document.createElement('div');
        fb.className = `feedback ${correct ? 'correct' : 'wrong'}`;
        fb.innerHTML = `
            <div class="fb-flag">${card.emoji}</div>
            <div class="fb-name">${correct ? '\u2705' : '\u274C'} ${cName(card)}</div>
            <div class="fb-year">${formatYear(card.year)}</div>
        `;
        wrapper.appendChild(fb);
        document.body.appendChild(wrapper);
        parseEmoji();
        setTimeout(() => wrapper.remove(), 2500);
    }

    function spawnConfetti() {
        const flags = ALL_CARDS.filter(c => c.type === 'flag').map(c => c.emoji);
        for (let i = 0; i < 35; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.textContent = flags[Math.floor(Math.random() * flags.length)];
            c.style.left = Math.random() * 100 + 'vw';
            c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
            c.style.animationDelay = (Math.random() * 1) + 's';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 4000);
        }
        parseEmoji();
    }

    // ===========================
    // GAME OVER
    // ===========================
    function endGame() {
        showScreen('solo-end');
        spawnConfetti();

        document.getElementById('end-score').textContent = score;
        document.getElementById('end-best-streak').textContent = bestStreak;

        const key = gameMode === 'timeline' ? 'pb_solo_best_timeline' : 'pb_solo_best_quiz';
        const prev = parseInt(localStorage.getItem(key) || '0', 10);
        const isNewBest = score > prev;
        if (isNewBest) {
            localStorage.setItem(key, score);
        }

        const newBestEl = document.getElementById('end-new-best');
        newBestEl.innerHTML = isNewBest ? `<div class="new-best">${t('new_best', 'NEW BEST!')}</div>` : '';

        const playAgainBtn = document.getElementById('end-play-again');
        playAgainBtn.onclick = () => {
            if (gameMode === 'timeline') startTimelineGame();
            else startQuizGame();
        };

        // Track analytics
        if (typeof trackEvent === 'function') {
            trackEvent('solo_game_over', { mode: gameMode, score, best_streak: bestStreak, new_best: isNewBest });
        }

        parseEmoji();
    }

    // ===========================
    // SHARE
    // ===========================
    function shareScore() {
        const modeLabel = gameMode === 'timeline' ? t('timeline_survival') : t('flag_survival');
        const streakText = bestStreak >= 3 ? ' | ' + '🔥'.repeat(Math.min(bestStreak, 10)) : '';
        const text = `PastBlast ${modeLabel}\n🏆 ${score} ${t('points')}${streakText}\n\nCan you beat my score?\nhttps://pastblast-production.up.railway.app/solo.html`;

        const btn = document.getElementById('end-share');

        if (navigator.share) {
            navigator.share({ text }).catch(() => {});
        } else {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '✓ Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = t('share', 'SHARE');
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => {});
        }

        if (typeof trackEvent === 'function') {
            trackEvent('solo_share', { mode: gameMode, score });
        }
    }

    // ===========================
    // TIMELINE SURVIVAL
    // ===========================
    let tlDeck = [];
    let tlTimeline = [];
    let tlCurrentCard = null;

    function buildTimelineDeck() {
        const landmarks = ALL_CARDS.filter(c => c.type === 'landmark' || c.type === 'history');
        const easy = shuffle(landmarks.filter(c => c.difficulty === 1 || (!c.difficulty && c.type === 'history')));
        const medium = shuffle(landmarks.filter(c => c.difficulty === 2));
        const hard = shuffle(landmarks.filter(c => c.difficulty === 3));
        // Flag cards for timeline: first 40 well-known, then rest
        const flagsEasy = ALL_CARDS.filter(c => c.type === 'flag').slice(0, 40);
        const flagsHard = ALL_CARDS.filter(c => c.type === 'flag').slice(40);
        return [...shuffle(easy), ...shuffle(flagsEasy), ...shuffle(medium), ...shuffle(flagsHard), ...shuffle(hard)];
    }

    function startTimelineGame() {
        gameMode = 'timeline';
        lives = 3;
        score = 0;
        streak = 0;
        bestStreak = 0;

        tlDeck = buildTimelineDeck();
        // Start with 1 card on the timeline
        const starter = tlDeck.shift();
        tlTimeline = [starter];

        showScreen('solo-timeline');
        renderLives('tl-lives');
        updateScore('tl-score');
        updateStreak('tl-streak');
        drawTimelineCard();
        renderTimeline();

        if (typeof trackEvent === 'function') {
            trackEvent('solo_game_start', { mode: 'timeline' });
        }
    }

    function updateScore(elId) {
        document.getElementById(elId).textContent = score;
    }

    function drawTimelineCard() {
        if (tlDeck.length === 0) {
            // Reshuffle all cards except ones on timeline
            const usedNames = new Set(tlTimeline.map(c => c.name));
            let fresh = ALL_CARDS.filter(c => !usedNames.has(c.name));
            if (fresh.length === 0) fresh = [...ALL_CARDS]; // truly exhausted
            tlDeck = shuffle(fresh);
        }
        tlCurrentCard = tlDeck.shift();
        renderCurrentCard();
        parseEmoji();
    }

    function renderCurrentCard() {
        const card = tlCurrentCard;
        const el = document.getElementById('tl-current-card');
        if (card.type === 'flag') {
            el.innerHTML = `
                <div class="category">${t('flag', 'Flag')}</div>
                <div class="flag-display">${card.emoji}</div>
                <div class="hint">${t('when_founded', 'When was this country founded?')}</div>
            `;
        } else {
            const label = card.type === 'landmark' ? t('landmark', 'Landmark') : t('history', 'History');
            el.innerHTML = `
                <div class="category">${label}</div>
                <div class="flag-display">${card.emoji}</div>
                <div class="card-title">${cName(card)}</div>
                <div class="description">${cDesc(card) || ''}</div>
            `;
        }
        parseEmoji();
    }

    function renderTimeline() {
        const el = document.getElementById('tl-timeline');
        el.innerHTML = '';
        const tl = [...tlTimeline].sort((a, b) => a.year - b.year);

        // Direction label — Earlier
        const earlierLabel = document.createElement('div');
        earlierLabel.className = 'tl-direction-label';
        earlierLabel.textContent = t('earlier');
        el.appendChild(earlierLabel);

        for (let i = 0; i <= tl.length; i++) {
            const drop = document.createElement('div');
            drop.className = 'timeline-slot drop-zone';
            drop.innerHTML = `<div class="drop-label">${t('tap_to_place')}</div>`;
            drop.dataset.index = i;
            drop.addEventListener('click', () => placeTimelineCard(i));
            el.appendChild(drop);

            if (i < tl.length) {
                const card = tl[i];
                const placed = document.createElement('div');
                placed.className = 'timeline-slot';
                placed.innerHTML = `
                    <div class="placed-card">
                        <div class="card-emoji">${card.emoji}</div>
                        <div class="card-name">${cName(card)}</div>
                        <div class="card-year">${formatYear(card.year)}</div>
                    </div>
                `;
                el.appendChild(placed);
            }
        }

        // Direction label — Later
        const laterLabel = document.createElement('div');
        laterLabel.className = 'tl-direction-label';
        laterLabel.textContent = t('later');
        el.appendChild(laterLabel);

        parseEmoji();
    }

    function isCorrectPlacement(card, index, tl) {
        const sorted = [...tl].sort((a, b) => a.year - b.year);
        const before = index > 0 ? sorted[index - 1] : null;
        const after = index < sorted.length ? sorted[index] : null;
        return (!before || before.year <= card.year) && (!after || card.year <= after.year);
    }

    function placeTimelineCard(index) {
        if (!tlCurrentCard) return;
        const card = tlCurrentCard;
        tlCurrentCard = null;

        const correct = isCorrectPlacement(card, index, tlTimeline);

        if (correct) {
            tlTimeline.push(card);
            score++;
            streak++;
            if (streak > bestStreak) bestStreak = streak;
            showFeedback(true, card);
        } else {
            streak = 0;
            showFeedback(false, card);
            const gameOver = loseLife('tl-lives');
            if (gameOver) {
                setTimeout(() => endGame(), 1800);
                return;
            }
        }

        updateScore('tl-score');
        updateStreak('tl-streak');

        setTimeout(() => {
            drawTimelineCard();
            renderTimeline();
        }, 1200);
    }

    // ===========================
    // FLAG QUIZ SURVIVAL
    // ===========================
    let qzDeck = [];
    let qzCurrentCard = null;
    let qzLocked = false;
    let acActiveIndex = -1;

    const FLAG_CARDS = ALL_CARDS.filter(c => c.type === 'flag');

    function buildQuizDeck() {
        // First 40 are well-known, rest harder — serve in that implicit order
        const wellKnown = shuffle(FLAG_CARDS.slice(0, 40));
        const harder = shuffle(FLAG_CARDS.slice(40));
        return [...wellKnown, ...harder];
    }

    function startQuizGame() {
        gameMode = 'quiz';
        lives = 3;
        score = 0;
        streak = 0;
        bestStreak = 0;

        qzDeck = buildQuizDeck();
        qzLocked = false;
        acActiveIndex = -1;

        showScreen('solo-quiz');
        renderLives('qz-lives');
        updateScore('qz-score');
        updateStreak('qz-streak');
        initQuizAutocomplete();
        nextQuizCard();

        if (typeof trackEvent === 'function') {
            trackEvent('solo_game_start', { mode: 'quiz' });
        }
    }

    function nextQuizCard() {
        if (qzDeck.length === 0) {
            // Reshuffle
            qzDeck = shuffle([...FLAG_CARDS]);
        }

        qzCurrentCard = qzDeck.shift();
        qzLocked = false;
        acActiveIndex = -1;

        const el = document.getElementById('qz-card');
        el.innerHTML = `<div class="quiz-flag">${qzCurrentCard.emoji}</div>`;

        const input = document.getElementById('qz-input');
        input.value = '';
        input.style.borderColor = 'rgba(255,255,255,0.2)';
        input.disabled = false;
        input.focus();
        document.getElementById('qz-autocomplete').style.display = 'none';

        parseEmoji();
    }

    function initQuizAutocomplete() {
        const input = document.getElementById('qz-input');
        const list = document.getElementById('qz-autocomplete');

        // Remove old listeners by replacing element
        const newInput = input.cloneNode(true);
        input.parentNode.replaceChild(newInput, input);

        newInput.addEventListener('input', () => {
            if (qzLocked) return;
            const val = newInput.value.trim().toLowerCase();
            list.innerHTML = '';
            acActiveIndex = -1;
            if (!val) { list.style.display = 'none'; return; }

            const rtl = typeof isRTL === 'function' && isRTL();
            const matches = FLAG_CARDS.filter(c => {
                if (c.name.toLowerCase().includes(val)) return true;
                if (rtl && c.name_he && c.name_he.includes(newInput.value.trim())) return true;
                return false;
            });

            if (matches.length === 0) { list.style.display = 'none'; return; }

            list.style.display = 'block';
            matches.slice(0, 15).forEach((card) => {
                const displayName = rtl && card.name_he ? card.name_he : card.name;
                const item = document.createElement('div');
                item.className = 'autocomplete-item';

                // Highlight matching part
                const searchIn = displayName.toLowerCase();
                const idx = searchIn.indexOf(val);
                if (idx >= 0) {
                    item.innerHTML = displayName.substring(0, idx) +
                        '<span class="match">' + displayName.substring(idx, idx + val.length) + '</span>' +
                        displayName.substring(idx + val.length);
                } else {
                    item.textContent = displayName;
                }

                item.addEventListener('click', () => submitQuizAnswer(card.name));
                list.appendChild(item);
            });
            parseEmoji();
        });

        newInput.addEventListener('keydown', (e) => {
            const items = list.querySelectorAll('.autocomplete-item');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                acActiveIndex = Math.min(acActiveIndex + 1, items.length - 1);
                updateAcActive(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                acActiveIndex = Math.max(acActiveIndex - 1, 0);
                updateAcActive(items);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (acActiveIndex >= 0 && items[acActiveIndex]) {
                    // Find the card by the displayed name
                    const displayText = items[acActiveIndex].textContent;
                    const match = FLAG_CARDS.find(c => c.name === displayText || c.name_he === displayText);
                    submitQuizAnswer(match ? match.name : displayText);
                } else if (items.length === 1) {
                    const displayText = items[0].textContent;
                    const match = FLAG_CARDS.find(c => c.name === displayText || c.name_he === displayText);
                    submitQuizAnswer(match ? match.name : displayText);
                }
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.quiz-input-wrap')) {
                list.style.display = 'none';
            }
        });
    }

    function updateAcActive(items) {
        items.forEach((item, i) => item.classList.toggle('active', i === acActiveIndex));
        if (items[acActiveIndex]) items[acActiveIndex].scrollIntoView({ block: 'nearest' });
    }

    function submitQuizAnswer(answer) {
        if (qzLocked || !qzCurrentCard) return;
        qzLocked = true;

        const input = document.getElementById('qz-input');
        const rtl = typeof isRTL === 'function' && isRTL();
        input.value = rtl && qzCurrentCard.name_he ? qzCurrentCard.name_he : answer;
        input.disabled = true;
        document.getElementById('qz-autocomplete').style.display = 'none';

        const correct = answer === qzCurrentCard.name;

        if (correct) {
            score++;
            streak++;
            if (streak > bestStreak) bestStreak = streak;
            input.style.borderColor = '#51cf66';
            showFeedback(true, qzCurrentCard);
        } else {
            streak = 0;
            input.style.borderColor = '#ff6b6b';
            showFeedback(false, qzCurrentCard);
            const gameOver = loseLife('qz-lives');
            if (gameOver) {
                setTimeout(() => endGame(), 1800);
                return;
            }
        }

        updateScore('qz-score');
        updateStreak('qz-streak');

        setTimeout(() => nextQuizCard(), 1500);
    }

    // ===========================
    // INIT
    // ===========================
    updateBestScores();
    parseEmoji();
    </script>
</body>
</html>
