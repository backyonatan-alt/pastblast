<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1b1464">
    <title>PastBlast</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="player.css">
    <link rel="stylesheet" href="rtl.css">
</head>
<body>
    <!-- WAITING IN LOBBY -->
    <div id="waiting" class="p-screen">
        <h1 class="p-logo">PASTBLAST</h1>
        <div class="player-name" id="my-name"></div>
        <div class="waiting-msg" data-i18n="waiting_host">Waiting for host to start…</div>
    </div>

    <!-- YOUR TURN — TIMELINE -->
    <div id="turn-timeline" class="p-screen" style="display:none;">
        <div class="p-timer-bar"><div class="p-timer-fill" id="tl-timer-fill"></div></div>
        <div class="p-card" id="tl-card"></div>
        <div class="p-instruction" aria-live="polite" data-i18n="tap_to_place">Tap a button to place the card</div>
        <div class="p-timeline" id="tl-timeline"></div>
    </div>

    <!-- YOUR TURN — QUIZ -->
    <div id="turn-quiz" class="p-screen" style="display:none;">
        <div class="p-timer-bar"><div class="p-timer-fill" id="quiz-timer-fill"></div></div>
        <div class="p-card" id="quiz-card"></div>
        <div class="p-input-wrap">
            <label for="quiz-input" class="sr-only">Country name</label>
            <input type="text" class="p-input" id="quiz-input" name="countryGuess" data-i18n="type_country" placeholder="Type country name…" autocomplete="off" spellcheck="false">
            <div class="p-autocomplete" id="quiz-autocomplete"></div>
        </div>
    </div>

    <!-- WAITING FOR OTHERS -->
    <div id="wait-screen" class="p-screen" style="display:none;">
        <div class="wait-emoji">👀</div>
        <div class="wait-msg" id="wait-msg">Waiting...</div>
        <div class="wait-scores" id="wait-scores"></div>
    </div>

    <!-- STEAL TURN -->
    <div id="steal-screen" class="p-screen" style="display:none;">
        <div class="p-timer-bar"><div class="p-timer-fill" id="steal-timer-fill"></div></div>
        <div class="steal-banner" data-i18n="steal">STEAL!</div>
        <div class="steal-warning" data-i18n="wrong_lose_point">Wrong = lose a point!</div>
        <div class="p-card" id="steal-card"></div>
        <div id="steal-input-area"></div>
        <button class="btn btn-pass" onclick="passSteal()" data-i18n="pass">PASS</button>
    </div>

    <!-- STEAL WAIT -->
    <div id="steal-wait-screen" class="p-screen" style="display:none;">
        <div class="steal-banner" data-i18n="steal">STEAL!</div>
        <div class="wait-msg" id="steal-wait-msg"></div>
    </div>

    <!-- MAP GAME -->
    <div id="map-screen" class="p-screen" style="display:none;padding:0;justify-content:stretch;">
        <div style="background:rgba(18,14,63,0.95);padding:8px 12px;text-align:center;z-index:1000;">
            <div style="font-size:0.7rem;color:rgba(255,255,255,0.4);" id="map-round-info"></div>
            <img id="map-photo" style="width:100%;max-width:260px;height:140px;object-fit:contain;border-radius:10px;margin:4px auto;display:block;background:rgba(0,0,0,0.3);" src="" alt="">
            <div style="font-size:0.8rem;color:rgba(255,255,255,0.45);" data-i18n="where_is_this">Where is this place?</div>
            <div class="timer-strip" style="margin-top:4px;"><div class="timer-fill" id="map-timer-fill" style="height:4px;"></div></div>
        </div>
        <div id="map-container" style="flex:1;z-index:1;"></div>
        <div class="crosshair" id="map-crosshair" style="display:block;position:fixed;top:55%;left:50%;transform:translate(-50%,-100%);z-index:1500;pointer-events:none;font-size:2rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));">📍</div>
        <div style="position:fixed;top:55%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:#ff6b6b;border:2px solid #fff;border-radius:50%;z-index:1500;pointer-events:none;box-shadow:0 0 8px rgba(255,107,107,0.6);" id="map-dot"></div>
        <div style="background:rgba(18,14,63,0.95);padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));text-align:center;z-index:1000;">
            <button class="lock-btn" id="map-lock-btn" onclick="mapLockIn()" style="background:#ffd43b;color:#1b1464;border:none;border-radius:14px;padding:14px 0;font-size:1.2rem;font-weight:900;font-family:'Fredoka',sans-serif;cursor:pointer;width:100%;max-width:350px;box-shadow:0 4px 0 #e8590c;letter-spacing:2px;">LOCK IN</button>
        </div>
    </div>

    <!-- MAP RESULT -->
    <div id="map-result-screen" class="p-screen" style="display:none;">
        <div id="map-result-card" style="background:#1f1a5c;border-radius:20px;padding:20px 24px;max-width:320px;width:100%;border:3px solid rgba(255,255,255,0.1);text-align:center;">
        </div>
        <button class="btn" style="max-width:280px;margin-top:16px;display:none;" id="map-next-btn">Waiting…</button>
    </div>

    <!-- RESULT FLASH -->
    <div id="result-screen" class="p-screen" style="display:none;">
        <div class="result-icon" id="result-icon"></div>
        <div class="result-text" id="result-text"></div>
    </div>

    <!-- GAME OVER -->
    <div id="end-screen" class="p-screen" style="display:none;">
        <h1 class="p-logo">GAME OVER</h1>
        <div class="end-rank" id="end-rank"></div>
        <div class="end-score" id="end-score"></div>
    </div>

    <!-- HOST LEFT -->
    <div id="host-left" class="p-screen" style="display:none;">
        <div class="wait-emoji">😢</div>
        <div class="wait-msg">Host disconnected</div>
        <a href="/" class="btn" style="max-width:200px;margin-top:20px;display:inline-block;">Back Home</a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="i18n.js"></script>
    <script src="analytics.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="player.js"></script>
</body>
</html>
